<form data-nav data-dirty-guard id="edit-system-update-form" data-storage-key="moreButtonsEditSystemUpdate" data-width="90vw" data-height="90vh">
  <h2>Edit System Update</h2>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Title</label>
    <input type="text" name="updateTitle" required placeholder="e.g. Employee Checklist Improvements" />
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Date</label>
    <input type="date" name="updateDate" required />
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Type</label>
    <div class="more-buttons-radio-btn-group-row">
      <label class="more-buttons-radio-btn --purple"><input type="radio" name="updateType" value="feature-release" required /> Feature release</label>
      <label class="more-buttons-radio-btn --green"><input type="radio" name="updateType" value="new-addition" /> New addition</label>
      <label class="more-buttons-radio-btn --blue"><input type="radio" name="updateType" value="improvement" /> Improvement</label>
    </div>
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Description</label>
    <textarea name="description" rows="4" data-richtext placeholder="Markdown allowed"></textarea>
  </div>

  <div class="more-buttons-form-group" data-components-row>
    <label class="more-buttons-label">Components</label>
    <div>
      <div data-update-components></div>
    </div>
  </div>
  <input type="hidden" name="componentOrder" />

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button success" data-action="submitEditSystemUpdate" data-validate data-save-state data-saved-label="All changes saved" data-unsaved-label="Save &amp; Publish"><span class="more-buttons-icon">save</span>Save &amp; Publish</button>
    <button type="button" class="more-buttons-button danger" data-action="deleteSystemUpdate"><span class="more-buttons-icon">delete</span>Delete</button>
  </div>
</form>
