<form id="system-updates-entry-form" data-storage-key="moreButtonsSystemUpdatesEntry" data-width="80vw" data-height="80vh">
  <h2>System Updates</h2>

  <div data-fetch-markdown="https://raw.githubusercontent.com/ollie-opus/opus-knowledge-base/main/docs/pages/system-updates.md">
    <div class="more-buttons-tabs">
      <div class="more-buttons-tab-list">
        <button type="button" class="more-buttons-tab --active" data-tab="draft-updates">Draft Updates</button>
        <button type="button" class="more-buttons-tab" data-tab="published-updates">Published Updates</button>
      </div>
      <div class="more-buttons-tab-panel" data-tab-panel="draft-updates" data-render="renderDraftUpdates"></div>
      <div class="more-buttons-tab-panel" data-tab-panel="published-updates" data-render="renderPublishedUpdates" hidden></div>
    </div>
  </div>

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button" data-action="openLogSystemUpdate">Log a system update</button>
    <button type="button" class="more-buttons-button secondary" data-action="back">Back</button>
  </div>
</form>
