<form data-nav data-dirty-guard id="edit-guide-section-form" data-storage-key="moreButtonsEditGuideSection" data-width="90vw" data-height="90vh">
  <h2 data-guide-section-heading>Edit section</h2>

  <div class="more-buttons-form-group" data-section-parent-row>
    <label class="more-buttons-label">Section parent</label>
    <select name="sectionParent" data-section-parent-select></select>
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Title</label>
    <input type="text" name="sectionTitle" required />
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Description</label>
    <textarea name="sectionDescription" rows="6" data-richtext placeholder="Markdown allowed — lists, defn lists, etc."></textarea>
  </div>

  <div class="more-buttons-form-group" data-components-row>
    <label class="more-buttons-label">Components</label>
    <div>
      <div data-section-components></div>
    </div>
  </div>
  <input type="hidden" name="componentOrder" />

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button success" data-action="submitEditGuideSection" data-validate data-save-state data-saved-label="Draft saved" data-unsaved-label="Save to draft"><span class="more-buttons-icon">outbound</span>Save to draft</button>
    <button type="button" class="more-buttons-button danger" data-action="deleteGuideSection" data-delete-section-btn><span class="more-buttons-icon">delete</span>Delete</button>
  </div>
</form>
