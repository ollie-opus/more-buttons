<form data-nav data-dirty-guard id="edit-page-settings-form" data-storage-key="moreButtonsEditPageSettings" data-width="90vw" data-height="90vh">
  <h2>Page settings</h2>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Icon</label>
    <input type="text" name="icon" placeholder="Search lucide icons…" autocomplete="off" />
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Hide elements</label>
    <div class="more-buttons-radio-group-column">
      <label class="more-buttons-sub-label">
        <input type="checkbox" name="hideNavigation" value="navigation" />
        Navigation
      </label>
      <label class="more-buttons-sub-label">
        <input type="checkbox" name="hideToc" value="toc" />
        Table of Contents
      </label>
      <label class="more-buttons-sub-label">
        <input type="checkbox" name="hidePath" value="path" />
        Path
      </label>
    </div>
  </div>

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button success" data-action="submitEditPageSettings" data-validate data-save-state data-saved-label="Draft saved" data-unsaved-label="Save to draft"><span class="more-buttons-icon">save</span>Save to draft</button>
  </div>
</form>
