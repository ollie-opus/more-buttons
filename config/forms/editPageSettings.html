<form data-nav data-dirty-guard id="edit-page-settings-form" data-storage-key="moreButtonsEditPageSettings" data-width="90vw" data-height="90vh">
  <h2>Page settings</h2>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Path</label>
    <div class="mb-path-field">
      <input type="text" name="path" placeholder="guides/employees" autocomplete="off" />
      <span class="mb-path-suffix" data-path-suffix>/…md</span>
    </div>
  </div>

  <div class="more-buttons-form-group">
    <label class="more-buttons-label">Icon</label>
    <input type="text" name="icon" placeholder="Search lucide icons…" autocomplete="off" />
  </div>

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button success" data-action="submitEditPageSettings" data-validate data-save-state data-saved-label="Draft saved" data-unsaved-label="Save to draft"><span class="more-buttons-icon">outbound</span>Save to draft</button>
  </div>
</form>
