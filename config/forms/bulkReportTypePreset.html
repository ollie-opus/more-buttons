<form id="preset-form" data-storage-key="moreButtonsReportTypesPreset" data-width="960px">
  <h2>Bulk Report Type Preset</h2>

  <p class="more-buttons-description">Choose install or uninstall for each report type, then save as a reusable preset.</p>

  <div class="more-buttons-form-group more-buttons-form-group--full">
    <div id="report-type-preset-list" data-page-radios="report_type_packages[]" data-rt-advanced-container="#report-type-advanced-list" class="more-buttons-rt-list"></div>
  </div>

  <details class="more-buttons-advanced-section">
    <summary class="more-buttons-advanced-toggle">System required report types</summary>
    <div class="more-buttons-form-group more-buttons-form-group--full" style="margin-top: 10px">
      <div id="report-type-advanced-list" class="more-buttons-rt-list"></div>
    </div>
  </details>

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button success" id="mb-form-save" data-action="save,close" data-validate><span class="more-buttons-icon">save</span>Save preset</button>
    <button type="button" class="more-buttons-button danger" id="mb-form-delete" data-action="delete,close"><span class="more-buttons-icon">delete</span>Delete preset</button>
    <button type="button" class="more-buttons-button secondary" id="mb-form-close" data-action="close"><span class="more-buttons-icon">close</span>Close</button>
  </div>
</form>
