<form data-nav id="knowledge-base-management-form" data-storage-key="moreButtonsKnowledgeBaseManagement" data-width="90vw" data-height="90vh">
  <h2>Knowledge Base</h2>

  <div class="more-buttons-tabs">
    <div class="more-buttons-tab-list">
      <button type="button" class="more-buttons-tab --active" data-tab="guides">Guides</button>
      <button type="button" class="more-buttons-tab" data-tab="system">System</button>
    </div>
    <div class="more-buttons-tab-panel" data-tab-panel="guides" data-kb-panel="guides"></div>
    <div class="more-buttons-tab-panel" data-tab-panel="system" data-kb-panel="system" hidden></div>
  </div>

  <div class="more-buttons-form-actions">
    <button type="button" class="more-buttons-button mb-reorder-toggle secondary" data-kb-reorder-toggle><span class="more-buttons-icon">swap_vert</span>Reorder mode disabled</button>
    <span class="mb-kb-actions" data-kb-actions="normal">
      <button type="button" class="more-buttons-button secondary" data-kb-open-capture-library><span class="more-buttons-icon">database</span>Capture library</button>
      <span class="mb-dock-sep" aria-hidden="true"></span>
      <button type="button" class="more-buttons-button" data-kb-create-guide><span class="more-buttons-icon">add</span>Create new guide</button>
    </span>
    <span class="mb-kb-actions" data-kb-actions="reorder" hidden>
      <span class="mb-dock-sep" aria-hidden="true"></span>
      <button type="button" class="more-buttons-button" data-kb-reorder-save aria-disabled="true"><span class="more-buttons-icon">verified</span>Publish changes to live</button>
      <button type="button" class="more-buttons-button secondary" data-kb-reorder-discard aria-disabled="true"><span class="more-buttons-icon">close</span>Discard changes</button>
    </span>
  </div>
</form>
